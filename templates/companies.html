{% extends "base.html" %}

{% block content %}
<div class="p-4">
    <h2 class="mb-4"><i class="fas fa-building"></i> Компании</h2>

    <div class="filter-card">
        <input type="text" id="searchCompany" class="form-control" placeholder="Поиск компании..." onkeyup="filterCompanies()">
    </div>

    <div id="companiesList" class="row mt-4"></div>
</div>

<script>
function loadCompanies() {
    $.get('/api/companies', function(companies) {
        window.allCompanies = companies;
        displayCompanies(companies);
    });
}

function displayCompanies(companies) {
    const container = $('#companiesList');
    container.empty();

    if (companies.length === 0) {
        container.html('<div class="alert alert-info">Компании не найдены</div>');
        return;
    }

    companies.forEach(company => {
        const card = `
            <div class="col-md-4 mb-3">
                <a href="/company/${encodeURIComponent(company)}" class="text-decoration-none">
                    <div class="card card-stats h-100">
                        <div class="card-body text-center">
                            <i class="fas fa-building fa-3x text-primary mb-3"></i>
                            <h5>${company}</h5>
                        </div>
                    </div>
                </a>
            </div>
        `;
        container.append(card);
    });
}

function filterCompanies() {
    const search = $('#searchCompany').val().toLowerCase();
    const filtered = window.allCompanies.filter(c => c.toLowerCase().includes(search));
    displayCompanies(filtered);
}

$(document).ready(function() {
    loadCompanies();
});
</script>
{% endblock %}
